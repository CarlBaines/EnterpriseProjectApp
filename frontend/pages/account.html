<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account</title>
    <link rel="stylesheet" href="../styles/account.css" />
    <script src="../scripts/account.js"></script>
  </head>

  <body>
    <div class="fixed-bar-top">
      <h1>Account</h1>
    </div>
    <div class="fixed-bar-back">
      <button
        class="back-btn"
        onclick="window.location.href = 'homepage.html'"
      ></button>
      <button class="edit-btn"></button>
    </div>
    <div class="app">
      <div class="account-info">
        <img
          src="../assets/images/user.png"
          class="profile-picture"
          id="profile-picture"
          alt="Profile picture"
        />
        <p class="user-name" id="user-name" style="font-weight: bolder">
          [Username]
        </p>
        <p class="user-age-group" id="user-age">[Age]</p>
        <p class="user-gender" id="user-gender">[Gender]</p>
      </div>
    </div>
    <div class="fixed-bar-bottom">
      <button
        class="bottom-navbar-btn"
        aria-label="Account"
        onclick="window.location.href = 'account.html'"
      ></button>
      <button
        class="bottom-navbar-btn"
        aria-label="Add"
        onclick="window.location.href = 'addgarden.html'"
      ></button>
      <button
        class="bottom-navbar-btn"
        aria-label="Settings"
        onclick="window.location.href = 'settings.html'"
      ></button>
    </div>
  </body>
</html>
