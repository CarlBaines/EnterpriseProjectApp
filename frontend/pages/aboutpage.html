<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Page</title>
    <link rel="stylesheet" href="../styles/aboutpage.css" />
  </head>
  <body>
    <div id="top-bar-container">
      <div class="header-text">
        <h1>About</h1>
      </div>
      <div class="back-arrow-button">
        <a href="settings.html">
          <img src="../assets\images/white_back_arrow.png" alt="A white back arrow button." width="30px">
        </a>
      </div>
      <div class="top-secondary-bar"></div>
    </div>
    <div id="app-version-container">
      <div class="app-version-outer-box">
        <div class="app-version-text">
          <p>App Version:</p>
          <div class="app-version-number">
            <p>V4.26.1</p>
          </div>      
        </div>
      </div>
    </div>
    <div id="privacy-policy-data-usage-container">
      <div class="privacy-policy-data-usage-outer-box">
        <div class="privacy-policy-data-usage-link">
          <p>Privacy Policy & Data Usage</p>
        </div>
      </div>
    </div>
    <div id="bottom-bar-container">
      <div class="bottom-secondary-bar"></div>
      <div class="bottom-primary-bar"></div>
    </div>
  </body>
</html>
