<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/signup.css">
    <title>Sign Up</title>
</head>

<body>
    <div class="container" id = "sign-up-container">
        <img src="../assets/images/temp_app_logo.png" alt="temp_logo" class="logo">
        <h1>Sign Up</h1>
        <div class="input-container">
            <form>
                <label for="username">Enter username</label><br>
                <input type="text" id="username" name="username"><br>
                <br>
                <label for="password">Enter password</label><br>
                <input type="password" id="password" name="password"><br>
                <br>
                <label for="confirm-password">Confirm password</label><br>
                <input type="password" id="confirm-password" name="confirm-password"><br>
                <br>
                <button type="submit" id="sign-up-btn">Sign Up</button>
            </form>
        </div>
        <div class="login-container">
            <p>Already have an account?</p>
            <a href="login.html">
                <p id="login-link">Login</p>
            </a>
        </div>  
    </div>
    
    <!--Modal which displays recovery key-->
    <div id="recovery-key-modal" class="modal">
        <div class="modal-content">
            <img src="../assets/images/temp_app_logo.png" alt="temp-logo" class="logo">
            <h1>Recovery Key</h1>
            <div class="recovery-key-container">
                <p>The recovery key is a code which can be used to unlock your account if you forget your password.
                    <br><b>Make a copy of this code and store it in a safe place.
                </p><b>
                    <p id="recovery-key">Recovery Key:</p>
                    <button type="submit" id="continue-btn">Continue</button>
                    <!--Could potentially add a copy button that allows the user to copy the recovery key to their clipboard-->
            </div>
        </div>
    </div>

    <div id="dynamic-modal" class="modal">
        <div class="dynamic-modal-content">
            <img src="../assets/images/temp_app_logo.png" alt="temp-logo" class="logo">
            <h1 id = "dynamic-modal-title">Title</h1>
            <h2 id= "dynamic-modal-message">Message</h2>
            <button type="submit" id = "dm-nav-btn">Continue</button>
        </div>
    </div>
</body>
<script src="../scripts/signup.js"></script>

</html>`
