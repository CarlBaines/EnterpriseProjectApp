<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login.css">
    <title>Login</title>
</head>

<body>
    <div class="container">
        <img src="../assets/images/temp_app_logo.png" alt="temp_logo" class="logo">
        <h1>Login</h1>
        <div class="input-container">
            <form>
                <label for="username">Enter username</label><br>
                <input type="text" id="username" name="username"><br>
                <br>
                <label for="password">Enter password</label><br>
                <input type="password" id="password" name="password">
                <a href = "forgotpassword.html"><p id="forgot-password-link">Forgot password?</p></a>
                <button type="submit" id="login-btn">Login</button>
            </form>
        </div>
        <div class="sign-up-container">
            <p>Don't have an account?</p>
            <a href = "signup.html"><p id="sign-up-link">Sign Up</p></a>
        </div>
    </div>

    <div id="dynamic-modal" class="modal">
        <div class="dynamic-modal-content">
            <img src="../assets/images/temp_app_logo.png" alt="temp-logo" class="logo">
            <h1 id = "dynamic-modal-title">Title</h1>
            <h2 id= "dynamic-modal-message">Message</h2>
            <button type="submit" id = "dm-nav-btn">Continue</button>
        </div>
    </div>
</body>
<script src="../scripts/login.js"></script>

</html>`
