<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="../styles/settings.css" />
  </head>
  <body>
    <div id="top-bar-container">
      <div class="header-text">
        <h1>Settings</h1>
      </div>
      <div class="back-arrow-button">
        <a href="homepage.html">
          <img src="../assets\images/white_back_arrow.png" alt="A white back arrow button." width="30px">
        </a>
      </div>
      <div class="top-secondary-bar"></div>
    </div>
    <div id="notifications-container">
      <div class="notifications-text">
        <p>Notifications</p>  
        <label class="notifications-switch">
          <input type="checkbox">         
          <span class="notifications-slider"></span>
          <span class="notifications-off-on"></span>
          <span class="notifications-switch-outer-box"></span>
        </label>
      </div>
      <div class="notifications-outer-box"></div>
    </div>
    <div id="colour-theme-container">
      <div class="colour-theme-text">
        <p>Colour Theme</p>
        <select>
          <option value="light" selected>Light</option>
          <option value="dark">Dark</option>
          <option value="high-contrast">High Contrast</option>
        </select>
      </div>
      <div class="colour-theme-outer-box"></div>
    </div>
    <div id="large-text-container">
      <div class="large-text-text">
        <p>Large Text</p>
        <label class="large-text-switch">
          <input type="checkbox">
          <span class="large-text-slider"></span>
          <span class="large-text-off-on"></span>
          <span class="large-text-switch-outer-box"></span>
        </label>
      </div>
      <div class="large-text-outer-box"></div>
    </div>
    <div id="large-icons-container">
      <div class="large-icons-text">
        <p>Large Icons</p>
        <label class="large-icons-switch">
          <input type="checkbox">
          <span class="large-icons-slider"></span>
          <span class="large-icons-off-on"></span>
          <span class="large-icons-switch-outer-box"></span>
        </label>
      </div>
      <div class="large-icons-outer-box"></div>
    </div>
    <div id="recovery-key-container">
      <label class="recovery-key-checkbox">
        <input type="checkbox">
        <span class="recovery-key-text"></span>
      </label>
      <div class="recovery-key-outer-box"></div>
    </div>
    <div id="change-password-container">
      <div class="change-password-link">
        <a href="forgotpassword.html">Change Password</a>
      </div>
      <div class="change-password-outer-box"></div>
    </div>
    <div id="about-container">
      <div class="about-link">
        <a href="aboutpage.html">About</a>
      </div>
      <div class="about-outer-box"></div>
    </div>
    <div id="bottom-bar-container">
      <div class="bottom-secondary-bar"></div>
      <div class="bottom-primary-bar"></div>
    </div>
  </body>
</html>
