<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Garden</title>
    <link rel="stylesheet" href="../styles/addgarden.css" />
    <script src="../scripts/addgarden.js" defer></script>
  </head>

  <body>
    <div class="fixed-bar-top">
      <h1>Add Garden</h1>
    </div>
    <div class="fixed-bar-back">
      <button
        class="back-btn"
        onclick="window.location.href = 'homepage.html'"
      ></button>
    </div>
    <div class="app">
      <form id="add-garden-form" onsubmit="saveGarden(event)">
        <label>
          <input
            type="file"
            accept=".jpg, .png, image/*"
            id="garden-image"
            class="garden-image"
          />
        </label>
        <p style="font-weight: bold">Preview Image</p>
        <label>
          <input
            class="garden-name"
            id="garden-name"
            type="text"
            placeholder="Name"
            required
          />
        </label>
        <button type="submit" class="create-btn">Save garden</button>
      </form>
    </div>

    <div id="myModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <span class="close">&times;</span>
          <h2>Image URL</h2>
        </div>
        <div class="modal-body">
          <input
            type="text"
            id="image-url-input"
            placeholder="Enter image URL here"
          />
        </div>
      </div>
    </div>
  </body>
  <script src="../scripts/addgarden.js"></script>
</html>
