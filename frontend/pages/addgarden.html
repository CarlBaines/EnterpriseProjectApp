<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Garden</title>
    <link rel="stylesheet" href="../styles/addgarden.css" />
    <script src="../scripts/addgarden.js" defer></script>
  </head>

  <body>
    <div class="fixed-bar-top">
      <h1>Add Garden</h1>
    </div>
    <div class="fixed-bar-back">
      <button class="back-btn" onclick="window.location.href = 'homepage.html'"></button>
    </div>
    <div class="app">
      <form id="add-garden-form" onsubmit="saveGarden(event)">
        <label>
          <input type="file" accept=".jpg, .png, image/*" id="garden-image" class="garden-image" />
        </label>
        <p style="font-weight: bold;">Preview Image</p>
        <label>
          <input class="garden-name" id="garden-name" type="text" placeholder="Name" required />
        </label>
        <button type="submit" class="create-btn">Save garden</button>
      </form>
    </div>

    <div id="myModal" class="modal">

    <div class="modal-content">
      <div class="modal-header">
        <span class="close">&times;</span>
        <h2>Image URL</h2>
      </div>
      <div class="modal-body">
        <input type="text" id="image-url-input" placeholder="Enter image URL here" />
      </div>
    </div>

</div>
  </body>
  <script>
    async function saveGarden(event) {
      if (event) {
        event.preventDefault();
      }

      const nameInput = document.getElementById("garden-name");
      const imageInput = document.getElementById("garden-image");
      if (!nameInput.value) {
        alert("Please enter a name for your garden.");
        return;
      }

      if(!imageInput.value) {
        alert("Please select an image for your garden.");
        return;
      }

      const dataUrl = await fileToDataUrl(imageInput.files[0]);

      alert("Saving garden: " + nameInput.value + " with image: " + dataUrl);

      const newGarden = {
        name: nameInput.value,
        image: dataUrl,
        dateCreated: Date.now()
      };

      let gardens = JSON.parse(localStorage.getItem("gardens")) || [];
      gardens.push(newGarden);
      localStorage.setItem("gardens", JSON.stringify(gardens));

      // Redirect to homepage after saving
      window.location.href = "homepage.html";
    }

    const imageInput = document.getElementById("garden-image");
    imageInput.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          imageInput.style.backgroundImage = `url(${e.target.result})`;
          imageInput.style.backgroundSize = "cover";
          imageInput.style.backgroundPosition = "center";
        }
        alert("Image selected: " + imageInput.value);
        reader.readAsDataURL(file);
      }
    });

    async function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
        if (!(file instanceof File)) {
            reject(new Error("Input must be a File object"));
            return;
        }

        const reader = new FileReader();
        reader.onload = () => resolve(reader.result); // Data URL result
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}
  </script>
</html>
