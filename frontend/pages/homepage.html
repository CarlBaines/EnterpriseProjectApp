<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Homepage</title>
    <link rel="stylesheet" href="../styles/homepage.css" />
    <script src="../scripts/homepage.js"></script>
  </head>

  <body>
    <div class="fixed-bar-top">
      <h1>Your Gardens</h1>
      <button
        class="notifications-btn"
        aria-label="Notifications"
        onclick="window.location.href = 'notifications.html'"
      ></button>
    </div>
    <div class="fixed-bar-search">
      <button class="sort-btn" aria-label="Sort"></button>
      <input
        type="text"
        placeholder="Search gardens..."
        aria-label="Search"
        class="search-input"
        id="search-input"
      />
      <button
        id="search-action-btn"
        class="search-action-btn"
        aria-label="Search"
        disabled
      ></button>
    </div>
    <div class="app">
      <p id="search-feedback" class="search-feedback" aria-live="polite"></p>
      <p id="no-results" class="no-results hidden" aria-live="polite">
        No gardens match that search.
      </p>
      <section id="garden-list" class="garden-list"></section>

      <!-- Template for garden items -->
      <template id="garden-item-template">
        <div class="garden-item">
          <!-- Garden preview image -->
          <img src="" alt="Garden Image" class="garden-image" />
          <!-- Garden name -->
          <h2 class="garden-name"></h2>

          <!-- Edit and delete buttons -->
          <div class="garden-actions">
            <button class="edit-btn" aria-label="Edit"></button>
            <button class="delete-btn" aria-label="Delete"></button>
          </div>
        </div>
      </template>
    </div>

    <div id="myModal" class="modal">
      <!-- Modal content -->
      <div class="modal-content">
        <div class="modal-header">
          <h2>Edit Garden</h2>
          <span class="close">&times;</span>
        </div>
        <div class="modal-body">
          <input
            type="file"
            accept=".jpg, .png, image/*"
            id="garden-image"
            class="modal-garden-image"
          />
          <input
            class="garden-name-input"
            type="text"
            id="garden-name-input"
            placeholder="Enter garden name here"
          />
        </div>
        <div class="modal-footer">
          <button id="save-image-btn">Save</button>
        </div>
      </div>
    </div>

    <div
      id="sort-modal"
      class="sort-menu"
      aria-label="Sort gardens"
      role="menu"
    >
      <p class="sort-menu-title">Sort By</p>
      <button id="sort-name-asc-btn" class="sort-option" role="menuitem">
        Name (A-Z)
      </button>
      <button id="sort-name-desc-btn" class="sort-option" role="menuitem">
        Name (Z-A)
      </button>
      <button id="sort-date-newest-btn" class="sort-option" role="menuitem">
        Date Created (Newest)
      </button>
      <button id="sort-date-oldest-btn" class="sort-option" role="menuitem">
        Date Created (Oldest)
      </button>
    </div>

    <div class="fixed-bar-bottom">
      <button
        class="bottom-navbar-btn"
        aria-label="Account"
        onclick="window.location.href = 'account.html'"
      ></button>
      <button
        class="bottom-navbar-btn"
        aria-label="Add"
        onclick="window.location.href = 'addgarden.html'"
      ></button>
      <button
        class="bottom-navbar-btn"
        aria-label="Settings"
        onclick="window.location.href = 'settings.html'"
      ></button>
    </div>
  </body>
</html>
