<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/forgotpassword.css">
    <title>Forgot Password</title>
</head>

<body>
    <div class="container">
        <img src="../assets/images/temp_app_logo.png" alt="temp_logo" class="logo">
        <h1>Forgot Password</h1>
        <div class="input-container">
            <form>
                <label for="username">Enter username</label><br>
                <input type="username" id="username" name="username" required><br>
                <br>
                <label for="recovery-key" id="recovery-key-label">Enter recovery key</label>
                <input type="text" id="recovery-key" name="recovery-key" required>
                <label for="new-password" id="new-password-label">Enter a new password</label>
                <input type="password" id="new-password" required>
                <label for="confirm-new-password" id="confirm-new-password-label">Confirm new password</label>
                <input type="password" id="confirm-new-password" required>
                <button type="submit" id="initiate-reset-btn">Forgot Password</button>
            </form>
        </div>
        <div class="back-to-login-container">
            <a href = "login.html"><p id="login-link">Back to Login</p></a>
        </div>
    </div>

    <div id="dynamic-modal" class="modal">
        <div class="dynamic-modal-content">
            <img src="../assets/images/temp_app_logo.png" alt="temp-logo" class="logo">
            <h1 id = "dynamic-modal-title">Title</h1>
            <h2 id= "dynamic-modal-message">Message</h2>
            <button type="submit" id = "dm-nav-btn">Continue</button>
        </div>
    </div>
</body>
<script src="../scripts/forgotpassword.js"></script>

</html>`
